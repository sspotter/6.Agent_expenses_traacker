<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Telegram Bot Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    input, textarea, button {
      width: 100%;
      margin: 5px 0;
      padding: 8px;
    }
    .user {
      border: 1px solid #ccc;
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h2>Telegram Bot Admin Dashboard</h2>

<label>Bot Token</label>
<input id="token" placeholder="123456:ABC-DEF..." />

<button onclick="fetchUsers()">Fetch Users</button>

<div id="users"></div>

<script>
async function fetchUsers() {
  const token = document.getElementById("token").value;
  const res = await fetch(`https://api.telegram.org/bot${token}/getUpdates`);
  const data = await res.json();

  const users = {};
  data.result.forEach(update => {
    if (update.message) {
      const msg = update.message;
      users[msg.chat.id] = {
        chat_id: msg.chat.id,
        username: msg.from.username || "N/A",
        first_name: msg.from.first_name,
        text: msg.text
      };
    }
  });

  const container = document.getElementById("users");
  container.innerHTML = "";

  Object.values(users).forEach(user => {
    const div = document.createElement("div");
    div.className = "user";
    div.innerHTML = `
      <b>${user.first_name}</b> (@${user.username})<br>
      Chat ID: ${user.chat_id}<br>
      Last message: ${user.text}<br><br>
      <textarea id="msg-${user.chat_id}" placeholder="Type message"></textarea>
      <button onclick="sendMessage('${user.chat_id}')">Send</button>
    `;
    container.appendChild(div);
  });
}

async function sendMessage(chatId) {
  const token = document.getElementById("token").value;
  const text = document.getElementById(`msg-${chatId}`).value;

  await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      chat_id: chatId,
      text: text
    })
  });

  <!-- alert("Message sent"); -->
}
</script>

</body>
</html>
