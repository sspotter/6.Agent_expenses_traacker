<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase Connection Test</title>
  <style>
    body {
      font-family: 'Courier New', monospace;
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      color: #4ec9b0;
    }
    pre {
      background: #252526;
      padding: 15px;
      border-radius: 5px;
      overflow-x: auto;
      border-left: 3px solid #4ec9b0;
    }
    .success { color: #4ec9b0; }
    .error { color: #f48771; }
    .info { color: #569cd6; }
    button {
      background: #0e639c;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin: 10px 5px;
    }
    button:hover {
      background: #1177bb;
    }
    #output {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>🧪 Supabase Connection Test</h1>
  <p>Click the button below to test your Supabase connection:</p>
  
  <button onclick="runTest()">Run Test</button>
  <button onclick="clearOutput()">Clear Output</button>
  <button onclick="deleteAllData()" style="background: #a12c2c;">🗑️ Delete All Data</button>
  
  <div id="output"></div>

  <script type="module">
    import { supabase } from './src/lib/supabase.ts';

    window.supabase = supabase;
    
    window.runTest = async function() {
      const output = document.getElementById('output');
      output.innerHTML = '<pre>🔍 Testing Supabase Connection...\n\n</pre>';

      function log(message, type = 'info') {
        const pre = output.querySelector('pre');
        const span = document.createElement('span');
        span.className = type;
        span.textContent = message + '\n';
        pre.appendChild(span);
      }

      // Test 1: Check credentials
      log('1️⃣ Checking environment variables:', 'info');
      const url = import.meta.env.VITE_SUPABASE_URL;
      const key = import.meta.env.VITE_SUPABASE_ANON_KEY;
      log(`   URL: ${url || '❌ Missing'}`, url ? 'success' : 'error');
      log(`   API Key: ${key ? '✅ Present (length: ' + key.length + ')' : '❌ Missing'}`, key ? 'success' : 'error');
      log('');

      // Test 2: SELECT
      log('2️⃣ Testing SELECT query:', 'info');
      try {
        const { data, error } = await supabase
          .from('daily_collections')
          .select('*')
          .limit(5);

        if (error) {
          log(`   ❌ Error: ${error.message}`, 'error');
          log(`   Details: ${JSON.stringify(error, null, 2)}`, 'error');
        } else {
          log(`   ✅ Success! Found ${data?.length || 0} records`, 'success');
          if (data && data.length > 0) {
            log(`   Sample: ${JSON.stringify(data[0], null, 2)}`, 'info');
          }
        }
      } catch (err) {
        log(`   ❌ Exception: ${err.message}`, 'error');
      }
      log('');

      // Test 3: INSERT
      log('3️⃣ Testing INSERT:', 'info');
      const testPayment = {
        user_id: 'default_user',
        date: '2026-01-20',
        expected_amount: 100,
        collected_amount: 100,
        status: 'FULL',
        notes: 'Test from browser'
      };

      try {
        const { data, error } = await supabase
          .from('daily_collections')
          .insert(testPayment)
          .select()
          .single();

        if (error) {
          log(`   ❌ Error: ${error.message}`, 'error');
          log(`   Details: ${JSON.stringify(error, null, 2)}`, 'error');
        } else {
          log(`   ✅ Success! Created record`, 'success');
          log(`   ID: ${data.id}`, 'info');
        }
      } catch (err) {
        log(`   ❌ Exception: ${err.message}`, 'error');
      }
      log('');

      // Test 4: UPSERT
      log('4️⃣ Testing UPSERT:', 'info');
      const updatedPayment = {
        user_id: 'default_user',
        date: '2026-01-20',
        expected_amount: 100,
        collected_amount: 50,
        status: 'PARTIAL',
        notes: 'Updated from browser'
      };

      try {
        const { data, error } = await supabase
          .from('daily_collections')
          .upsert(updatedPayment, {
            onConflict: 'user_id,date',
            ignoreDuplicates: false
          })
          .select()
          .single();

        if (error) {
          log(`   ❌ Error: ${error.message}`, 'error');
          log(`   Details: ${JSON.stringify(error, null, 2)}`, 'error');
        } else {
          log(`   ✅ Success! Updated record`, 'success');
          log(`   Status: ${data.status}, Amount: $${data.collected_amount}`, 'info');
        }
      } catch (err) {
        log(`   ❌ Exception: ${err.message}`, 'error');
      }
      log('');

      log('✅ Test complete!', 'success');
    };

    window.deleteAllData = async function() {
      if (!confirm('🚨 ARE YOU SURE? This will permanently delete ALL data in ALL tables.')) return;

      const output = document.getElementById('output');
      output.innerHTML = '<pre>🧨 Deleting all data...\n\n</pre>';

      function log(message, type = 'info') {
        const pre = output.querySelector('pre');
        const span = document.createElement('span');
        span.className = type;
        span.textContent = message + '\n';
        pre.appendChild(span);
      }

      const tables = [
        'payment_events',
        'settlement_allocations',
        'expense_payments',
        'daily_collections',
        'weekly_expenses',
        'settlements'
      ];

      for (const table of tables) {
        log(`🧹 Clearing ${table}...`);
        try {
          // Broad delete: neq zero uuid or just match anything
          const { error } = await supabase
            .from(table)
            .delete()
            .neq('id', '00000000-0000-0000-0000-000000000000'); // Standard hack to delete all

          if (error) {
            log(`   ❌ Failed: ${error.message}`, 'error');
          } else {
            log(`   ✅ Table cleared`, 'success');
          }
        } catch (err) {
          log(`   ❌ Exception: ${err.message}`, 'error');
        }
      }

      log('\n✨ All tables processed.', 'success');
    };

    window.clearOutput = function() {
      document.getElementById('output').innerHTML = '';
    };
  </script>
</body>
</html>
